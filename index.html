<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Business Law Defender</title>

<style>

body{
margin:0;
font-family:Arial;
background:#1f2430;
color:white;
text-align:center;
}

.container{
width:92%;
margin:auto;
padding:20px;
}

.card{
background:#31384a;
margin:20px;
padding:20px;
border-radius:12px;
text-align:left;
line-height:1.6;
}

button{
padding:12px 18px;
margin:8px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
}

h1{
color:#7fd8ff;
text-align:center;
}

h2{
color:#9ce8ff;
}

.area{
color:#ffd56b;
font-weight:bold;
}

.center{
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Business Law Defender</h1>

<div class="center">

<p>

Learn → Apply → Assess

</p>

<h2 id="score">

Score: 0

</h2>

</div>

<div class="card center">

<button onclick="database()">Law Database</button>

<button onclick="historyPage()">History Timeline</button>

<button onclick="detailedLaws()">Detailed Laws</button>

<button onclick="updates()">Legal Updates</button>

<button onclick="startCases()">Case Investigation</button>

<button onclick="finalAssessment()">Final Assessment</button>

</div>

<div id="content">

<div class="card">

Welcome Legal Investigator.

Choose a module to begin learning UK Business Law.

</div>

</div>

</div>

<script>

let score=0;

const laws=[

{

area:"Consumer Law",

name:"Consumer Rights Act 2015",

history:"Consumer protection rules were previously spread across different laws such as the Sale of Goods Act 1979. This caused confusion for consumers and businesses. The Consumer Rights Act 2015 simplified and combined these protections.",

purpose:"Protect consumers when purchasing goods, services and digital content.",

points:[

"Goods must be satisfactory quality",

"Goods must be fit for purpose",

"Goods must match description",

"Consumers have rights to repair replacement or refund"

],

impact:"Businesses must ensure products meet legal standards or face complaints and legal action."

},

{

area:"Consumer Law",

name:"Consumer Contracts (Information, Cancellation and Additional Charges) Regulations 2013",

history:"Growth in e-commerce increased concerns regarding online purchases and hidden charges, leading to stronger distance selling protections.",

purpose:"Protect customers buying online or remotely.",

points:[

"14-day cancellation period",

"Businesses must provide clear information",

"Protection against hidden charges",

"Distance selling rights"

],

impact:"Online businesses must communicate information clearly."

},

{

area:"GDPR",

name:"UK GDPR",

history:"Rapid growth of digital business increased privacy risks. GDPR was retained after Brexit to continue protecting personal data.",

purpose:"Protect personal information and control how organisations process data.",

points:[

"Lawful processing",

"Consent requirements",

"Data minimisation",

"Access rights"

],

impact:"Organisations face penalties if data is mishandled."

},

{

area:"GDPR",

name:"Data Protection Act 2018",

history:"Created to implement GDPR within UK law and strengthen privacy protections.",

purpose:"Provide UK-specific rules supporting GDPR.",

points:[

"Privacy protection",

"Data processing rules",

"Enforcement powers",

"Individual rights"

],

impact:"Supports investigations and penalties."

},

{

area:"Employment Law",

name:"Employment Rights Act 1996",

history:"Introduced to improve employee protection and standardise workplace rights.",

purpose:"Protect workers during employment.",

points:[

"Unfair dismissal rights",

"Contracts",

"Redundancy protection"

],

impact:"Employers must follow fair procedures."

}

];

function database(){

let html="";

laws.forEach(l=>{

html+=`

<div class='card'>

<div class='area'>${l.area}</div>

<h2>${l.name}</h2>

<b>Purpose</b><br>

${l.purpose}

<br><br>

<b>Key Points</b><br>

${l.points.join("<br>")}

<br><br>

<b>Business Impact</b><br>

${l.impact}

</div>

`;

});

document.getElementById("content").innerHTML=html;

}

function historyPage(){

let html="";

laws.forEach(l=>{

html+=`

<div class='card'>

<h2>${l.name}</h2>

${l.history}

</div>

`;

});

document.getElementById("content").innerHTML=html;

}

function detailedLaws(){

document.getElementById("content").innerHTML=`

<div class='card'>

<h2>Consumer Rights Act 2015</h2>

Purpose:

Protect consumers purchasing goods services and digital products.

<br><br>

This legislation gives consumers legal rights when products are faulty or misleading.

<br><br>

Consumer Rights Include:

• satisfactory quality

• fit for purpose

• as described

<br><br>

Remedies:

• repair

• replacement

• refund

<br><br>

Business Impact:

Businesses must improve quality control and customer service.

<br><br>

Example:

A customer buys a laptop.

The laptop fails after 2 days.

Consumer can request remedy.

</div>

<div class='card'>

<h2>Consumer Contracts Regulations 2013</h2>

Purpose:

Protect online consumers.

<br><br>

The law became important because online shopping increased rapidly.

<br><br>

Rights:

• 14-day cancellation period

• clear information requirements

• transparent pricing

• hidden charge protection

<br><br>

Business Impact:

Businesses must explain terms clearly.

<br><br>

Example:

Customer buys headphones online.

Changes mind within cancellation period.

Customer may cancel purchase.

</div>

`;

}

function updates(){

document.getElementById("content").innerHTML=`

<div class='card'>

<h2>Pending Changes and Reliability</h2>

Consumer Law:

Guidance reviewed regularly.

<br><br>

GDPR:

Privacy guidance evolves with digital risks.

<br><br>

Employment:

Minimum wage guidance updated frequently.

<br><br>

How Information Was Checked:

1. Checked legislation.gov.uk

2. Compared official guidance

3. Reviewed publication dates

4. Compared multiple sources

5. Used secondary sources only for support

</div>

`;

}

const cases=[

{

q:"Laptop breaks after 2 days.",

answer:"Consumer Rights Act 2015 applies because faulty goods may qualify for repair replacement or refund.",

correct:"Repair Replacement Refund"

},

{

q:"Customer changes mind after online purchase.",

answer:"Consumer Contracts Regulations may allow cancellation rights.",

correct:"Cancellation Rights"

}

];

let current=0;

function startCases(){

current=0;

loadCase();

}

function loadCase(){

if(current>=cases.length){

document.getElementById("content").innerHTML=

"<div class='card'>All Cases Completed</div>";

return;

}

let c=cases[current];

document.getElementById("content").innerHTML=

`

<div class='card'>

<h2>${c.q}</h2>

<button onclick="solve()">Show Answer</button>

</div>

`;

}

function solve(){

score+=10;

alert(cases[current].answer);

document.getElementById("score").innerHTML="Score: "+score;

current++;

loadCase();

}

function finalAssessment(){

document.getElementById("content").innerHTML=

`

<div class='card'>

<h1>Assessment Complete</h1>

Final Score:

${score}

<br><br>

You have completed learning legislation history application and case analysis.

</div>

`;

}

</script>

</body>

</html>
