<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Business Law Defender</title>

<style>

body{
margin:0;
font-family:Arial;
background:#1f2430;
color:white;
text-align:center;
}

.container{
width:92%;
margin:auto;
padding:20px;
}

.card{
background:#31384a;
margin:20px;
padding:20px;
border-radius:12px;
}

button{

padding:12px 18px;

margin:8px;

font-size:16px;

border:none;

border-radius:8px;

cursor:pointer;

}

h1{

color:#79d6ff;

}

h2{

color:#9aeaff;

}

.area{

color:#ffd56f;

}

</style>

</head>

<body>

<div class="container">

<h1>Business Law Defender</h1>

<p>Learn → Apply → Assess</p>

<h2 id="score">

Score: 0

</h2>

<div class="card">

<button onclick="database()">
Law Database
</button>

<button onclick="historyPage()">
History Timeline
</button>

<button onclick="detailedLaws()">
Detailed Laws
</button>

<button onclick="updates()">
Legal Updates
</button>

<button onclick="startCases()">
Case Investigation
</button>

<button onclick="finalAssessment()">
Final Assessment
</button>

</div>

<div id="content">

<div class="card">

Welcome Legal Investigator

</div>

</div>

</div>

<script>

let score=0;

const laws=[

{

area:"Consumer Law",

name:"Consumer Rights Act 2015",

history:

"Created to simplify fragmented consumer protections and combine earlier legislation into one framework.",

points:[

"satisfactory quality",

"fit for purpose",

"as described",

"repair replacement refund rights"

]

},

{

area:"Consumer Law",

name:"Consumer Contracts (Information, Cancellation and Additional Charges) Regulations 2013",

history:

"Created to improve online and distance selling protections.",

points:[

"cancellation rights",

"distance selling protection",

"transparent charges",

"clear information"

]

},

{

area:"GDPR",

name:"UK GDPR",

history:

"Introduced after increasing concerns over digital privacy and retained after Brexit.",

points:[

"lawful processing",

"consent",

"access rights",

"data minimisation"

]

},

{

area:"GDPR",

name:"Data Protection Act 2018",

history:

"Introduced to support GDPR implementation within UK law.",

points:[

"privacy protections",

"enforcement rules",

"data rights",

"processing requirements"

]

},

{

area:"Employment Law",

name:"Employment Rights Act 1996",

history:

"Developed to strengthen employee protections and workplace rights.",

points:[

"unfair dismissal rights",

"employment contracts",

"redundancy rights"

]

},

{

area:"Employment Law",

name:"Equality Act 2010",

history:

"Combined older discrimination laws into one framework.",

points:[

"anti discrimination",

"equal treatment",

"protected characteristics"

]

},

{

area:"Employment Law",

name:"National Minimum Wage Act 1998",

history:

"Introduced minimum wage protections for workers.",

points:[

"minimum pay rights",

"employer obligations",

"worker protection"

]

}

];

function database(){

let html="";

laws.forEach(l=>{

html+=`

<div class='card'>

<div class='area'>

${l.area}

</div>

<h2>

${l.name}

</h2>

<b>Key Points</b>

<br><br>

${l.points.join("<br>")}

</div>

`;

});

document.getElementById("content").innerHTML=html;

}

function historyPage(){

let html="";

laws.forEach(l=>{

html+=`

<div class='card'>

<h2>

${l.name}

</h2>

${l.history}

</div>

`;

});

document.getElementById("content").innerHTML=html;

}

function detailedLaws(){

document.getElementById("content").innerHTML=`

<div class='card'>

<h2>

Consumer Rights Act 2015

</h2>

Purpose:

Protect consumers buying goods and services.

<br><br>

Rights:

<br>

• satisfactory quality

<br>

• fit for purpose

<br>

• as described

<br><br>

Remedies:

repair

replacement

refund

<br><br>

Example:

Customer buys laptop.

Laptop breaks after two days.

Consumer may request remedy.

</div>

<div class='card'>

<h2>

Consumer Contracts Regulations 2013

</h2>

Purpose:

Protect online consumers.

<br><br>

Rules:

<br>

• cancellation rights

<br>

• clear information

<br>

• transparent charges

<br>

• distance selling protection

<br><br>

Example:

Customer buys online.

Changes mind shortly after purchase.

Cancellation rights may apply.

</div>

`;

}

function updates(){

document.getElementById("content").innerHTML=`

<div class='card'>

<h2>

Pending Changes / Reliability

</h2>

Consumer Law:

No major legislative changes identified.

<br><br>

GDPR:

Guidance reviewed regularly.

<br><br>

Employment:

Minimum wage guidance updated regularly.

<br><br>

How Checked:

<br><br>

1. Checked UK government legislation database

<br>

2. Compared official guidance

<br>

3. Verified publication dates

<br>

4. Compared multiple sources

</div>

`;

}

const cases=[

{

q:"Laptop breaks after 2 days.",

options:[

"Ignore issue",

"Repair replacement refund",

"Throw away"

],

correct:1

},

{

q:"Customer wants to cancel online purchase.",

options:[

"No rights",

"Cancellation rights may apply",

"Employment law"

],

correct:1

},

{

q:"Company leaked customer emails.",

options:[

"Data issue",

"No problem",

"Normal"

],

correct:0

}

];

let current=0;

function startCases(){

current=0;

loadCase();

}

function loadCase(){

if(current>=cases.length){

document.getElementById("content").innerHTML=

`

<div class='card'>

All Cases Complete

</div>

`;

return;

}

let c=cases[current];

let html=

`

<div class='card'>

<h2>

${c.q}

</h2>

`;

c.options.forEach((x,i)=>{

html+=`

<button onclick="answer(${i})">

${x}

</button>

`;

});

html+="</div>";

document.getElementById("content").innerHTML=html;

}

function answer(choice){

if(choice===cases[current].correct){

score+=10;

alert("Correct");

}else{

alert("Incorrect");

}

document.getElementById("score").innerHTML=

"Score: "+score;

current++;

loadCase();

}

function finalAssessment(){

let rank="Beginner";

if(score>=20){

rank="Legal Advisor";

}

if(score>=30){

rank="Legal Expert";

}

document.getElementById("content").innerHTML=

`

<div class='card'>

<h1>

Final Assessment

</h1>

Score:

${score}

<br><br>

Rank:

${rank}

<br><br>

Evaluates:

<br>

✓ legislation knowledge

<br>

✓ historical understanding

<br>

✓ legal application

</div>

`;

}

</script>

</body>

</html>
